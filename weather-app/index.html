<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气预报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .weather-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            border-color: #667eea;
        }
        
        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .weather-info {
            text-align: center;
        }
        
        .city-name {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .date {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .temperature {
            color: #667eea;
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .weather-desc {
            color: #666;
            font-size: 20px;
            margin-bottom: 30px;
        }
        
        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .detail-item {
            background: rgba(102, 126, 234, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .detail-item .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .detail-item .value {
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }
        
        .forecast {
            margin-top: 30px;
            border-top: 1px solid #ddd;
            padding-top: 30px;
        }
        
        .forecast-title {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }
        
        .forecast-days {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .forecast-day {
            background: rgba(102, 126, 234, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .forecast-day .day {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .forecast-day .temp {
            color: #333;
            font-size: 20px;
            font-weight: bold;
        }
        
        .forecast-day .icon {
            font-size: 30px;
            margin-bottom: 5px;
        }
        
        .error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .details {
                grid-template-columns: 1fr;
            }
            
            .forecast-days {
                grid-template-columns: 1fr;
            }
            
            .temperature {
                font-size: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div class="header">
            <h1>🌤️ 天气预报</h1>
            <p>输入城市名称查询实时天气</p>
        </div>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="输入城市名称（如：北京、上海）" value="北京">
            <button onclick="getWeather()">查询</button>
        </div>
        
        <div id="weatherResult">
            <div class="loading">正在加载天气数据...</div>
        </div>
    </div>
    
    <script>
        // 使用免费的天气API（wttr.in）
        const API_BASE = 'https://wttr.in';
        
        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('请输入城市名称');
                return;
            }
            
            showLoading();
            
            try {
                // wttr.in 提供免费天气数据
                const response = await fetch(`${API_BASE}/${encodeURIComponent(city)}?format=j1`);
                
                if (!response.ok) {
                    throw new Error('城市未找到');
                }
                
                const data = await response.json();
                displayWeather(data, city);
            } catch (error) {
                showError(`查询失败: ${error.message}`);
            }
        }
        
        function displayWeather(data, city) {
            const current = data.current_condition[0];
            const forecast = data.weather.slice(0, 3);
            
            const weatherIcons = {
                'Clear': '☀️',
                'Sunny': '☀️',
                'Partly cloudy': '⛅',
                'Cloudy': '☁️',
                'Overcast': '☁️',
                'Mist': '🌫️',
                'Fog': '🌫️',
                'Rain': '🌧️',
                'Light rain': '🌦️',
                'Heavy rain': '⛈️',
                'Snow': '❄️',
                'Light snow': '🌨️',
                'Heavy snow': '❄️',
                'Thunder': '⛈️'
            };
            
            const icon = weatherIcons[current.weatherDesc[0].value] || '🌤️';
            
            const html = `
                <div class="weather-info">
                    <div class="city-name">${city}</div>
                    <div class="date">${formatDate(new Date())}</div>
                    <div class="temperature">${current.temp_C}°C</div>
                    <div class="weather-desc">${icon} ${current.weatherDesc[0].value}</div>
                    
                    <div class="details">
                        <div class="detail-item">
                            <div class="label">💨 风速</div>
                            <div class="value">${current.windspeedKmph} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">💧 湿度</div>
                            <div class="value">${current.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">🌡️ 体感温度</div>
                            <div class="value">${current.FeelsLikeC}°C</div>
                        </div>
                    </div>
                    
                    <div class="forecast">
                        <div class="forecast-title">📅 未来3天预报</div>
                        <div class="forecast-days">
                            ${forecast.map((day, index) => {
                                const dayIcon = weatherIcons[day.hourly[4].weatherDesc[0].value] || '🌤️';
                                const dayName = index === 0 ? '今天' : index === 1 ? '明天' : '后天';
                                return `
                                    <div class="forecast-day">
                                        <div class="day">${dayName}</div>
                                        <div class="icon">${dayIcon}</div>
                                        <div class="temp">${day.maxtempC}° / ${day.mintempC}°</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('weatherResult').innerHTML = html;
        }
        
        function formatDate(date) {
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            return date.toLocaleDateString('zh-CN', options);
        }
        
        function showLoading() {
            document.getElementById('weatherResult').innerHTML = '<div class="loading">正在查询天气数据...</div>';
        }
        
        function showError(message) {
            document.getElementById('weatherResult').innerHTML = `<div class="error">${message}</div>`;
        }
        
        // 页面加载时自动查询北京天气
        window.onload = () => getWeather();
    </script>
</body>
</html>
